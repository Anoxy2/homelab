# /etc/watchdog.conf - Hardware Watchdog für Raspberry Pi 5
# bcm2835_wdt Treiber (Builtin)
# Minimal-Konfiguration für System-Hänger-Erkennung

# Device
watchdog-device = /dev/watchdog

# Interval: Lebenszeichen alle 10 Sekunden
interval = 10

# Timeout: 15 Sekunden ohne Heartbeat → Reboot
# Muss >= 15 sein für bcm2835_wdt
watchdog-timeout = 15

# Logging
verbose = 1

# Selbst-Healing: Reboot bei extrem hoher Load (> 24 für 1 Minute)
max-load-1 = 24
